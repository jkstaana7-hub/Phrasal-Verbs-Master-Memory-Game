<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RoboTalk V6A - Robot Face Mode</title>
  <style>
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial, Helvetica, sans-serif;
      background:#071b3a;
      color:white;
      touch-action:manipulation;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .robot-screen{
      width:100vw;
      height:100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(110,209,255,.35), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(255,223,109,.25), transparent 25%),
        linear-gradient(145deg,#123d7c,#06172f 65%,#041024);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      padding:clamp(14px,3vw,34px);
      position:relative;
    }

    .top-bar{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:900;
      letter-spacing:.08em;
      opacity:.92;
      font-size:clamp(14px,2vw,24px);
      user-select:none;
    }

    .brand{
      background:rgba(255,255,255,.12);
      border:2px solid rgba(255,255,255,.25);
      padding:10px 18px;
      border-radius:999px;
      backdrop-filter:blur(6px);
    }

    .teacher-dot{
      width:54px;
      height:54px;
      border-radius:50%;
      background:rgba(255,255,255,.08);
      border:2px solid rgba(255,255,255,.18);
    }

    .face-area{
      flex:1;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:clamp(24px,5vh,52px);
    }

    .eyes{
      display:flex;
      gap:clamp(42px,9vw,120px);
      align-items:center;
      justify-content:center;
      transition:.2s ease;
    }

    .eye{
      width:clamp(112px,18vw,230px);
      height:clamp(112px,18vw,230px);
      background:#f7fcff;
      border-radius:45%;
      border:clamp(8px,1.2vw,16px) solid #73d9ff;
      position:relative;
      box-shadow:
        0 0 25px rgba(115,217,255,.8),
        inset 0 -14px 24px rgba(39,109,180,.18);
      overflow:hidden;
      transition:.16s ease;
    }

    .pupil{
      position:absolute;
      width:42%;
      height:42%;
      border-radius:50%;
      background:#09234d;
      left:29%;
      top:30%;
      box-shadow:inset 0 0 0 8px #1e83ff;
      transition:.25s ease;
    }

    .pupil:after{
      content:"";
      position:absolute;
      width:28%;
      height:28%;
      border-radius:50%;
      background:white;
      top:18%;
      left:20%;
    }

    .blink .eye{
      height:clamp(22px,4vw,44px);
      border-radius:999px;
      margin-top:clamp(45px,7vw,95px);
      margin-bottom:clamp(45px,7vw,95px);
    }

    .blink .pupil{opacity:0}

    .thinkingEyes .pupil{left:12%}
    .listeningEyes .pupil{transform:scale(1.08)}
    .happyEyes .eye{border-radius:50% 50% 42% 42%}

    .mouth-wrap{
      height:clamp(90px,15vh,170px);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .mouth{
      width:clamp(150px,23vw,310px);
      height:clamp(48px,8vw,92px);
      background:#ff6f91;
      border:clamp(7px,1vw,14px) solid #ffd2df;
      border-radius:0 0 999px 999px;
      box-shadow:0 0 26px rgba(255,111,145,.65);
      transition:.12s ease;
      position:relative;
      overflow:hidden;
    }

    .mouth:before{
      content:"";
      position:absolute;
      width:100%;
      height:42%;
      left:0;
      top:0;
      background:rgba(255,255,255,.28);
    }

    .mouth.closed{
      height:clamp(16px,3vw,28px);
      border-radius:999px;
      background:#ffd2df;
      box-shadow:0 0 14px rgba(255,210,223,.55);
    }

    .mouth.thinking{
      width:clamp(90px,14vw,160px);
      height:clamp(28px,4vw,44px);
      border-radius:999px;
      background:#ffd2df;
    }

    .mouth.talking{
      animation:talkMouth .18s infinite alternate ease-in-out;
    }

    @keyframes talkMouth{
      from{height:clamp(24px,4vw,45px); border-radius:999px}
      to{height:clamp(76px,12vw,135px); border-radius:0 0 999px 999px}
    }

    .status-panel{
      width:min(980px,94vw);
      min-height:clamp(92px,14vh,145px);
      border-radius:34px;
      border:4px solid rgba(255,255,255,.25);
      background:rgba(255,255,255,.14);
      box-shadow:0 14px 36px rgba(0,0,0,.22);
      backdrop-filter:blur(8px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:14px 22px;
      margin-bottom:clamp(8px,2vh,18px);
    }

    .status{
      font-size:clamp(30px,6vw,74px);
      font-weight:1000;
      letter-spacing:.03em;
      line-height:1.05;
      text-shadow:0 4px 14px rgba(0,0,0,.25);
    }

    .substatus{
      margin-top:8px;
      font-size:clamp(16px,2.6vw,32px);
      font-weight:800;
      opacity:.92;
    }

    .start-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(145deg,rgba(6,23,47,.96),rgba(18,61,124,.94));
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      z-index:20;
      padding:28px;
    }

    .start-overlay.hidden{display:none}

    .start-title{
      font-size:clamp(46px,9vw,108px);
      font-weight:1000;
      margin:0 0 12px;
      color:#9de8ff;
      text-shadow:0 0 30px rgba(115,217,255,.65);
    }

    .start-sub{
      font-size:clamp(18px,3vw,34px);
      font-weight:800;
      margin:0 0 32px;
      max-width:900px;
      line-height:1.3;
    }

    button{
      font-size:clamp(24px,4vw,46px);
      font-weight:1000;
      border:0;
      border-radius:999px;
      padding:22px 44px;
      cursor:pointer;
      background:#27d96c;
      color:#062417;
      box-shadow:0 16px 34px rgba(0,0,0,.28);
    }

    .small-actions{
      position:absolute;
      right:18px;
      bottom:18px;
      z-index:9;
      display:flex;
      gap:10px;
      opacity:.22;
      transition:.2s;
    }

    .small-actions:hover{opacity:1}
    .small-actions button{
      font-size:14px;
      padding:10px 14px;
      background:rgba(255,255,255,.2);
      color:white;
      border:1px solid rgba(255,255,255,.3);
    }

    .hidden-panel{
      position:absolute;
      top:80px;
      right:20px;
      width:min(420px,90vw);
      max-height:70vh;
      overflow:auto;
      background:rgba(255,255,255,.96);
      color:#102033;
      border-radius:20px;
      padding:18px;
      z-index:30;
      display:none;
      box-shadow:0 18px 45px rgba(0,0,0,.28);
    }

    .hidden-panel.show{display:block}
    .hidden-panel h3{margin-top:0;color:#123d7c}
    .debug{
      background:#f3f6fb;
      border:1px solid #dce6f5;
      border-radius:12px;
      padding:10px;
      font-size:13px;
      line-height:1.45;
      height:180px;
      overflow:auto;
      white-space:pre-wrap;
    }

    @media (orientation:portrait){
      .robot-screen{padding-top:22px}
      .face-area{gap:38px}
      .eyes{gap:42px}
      .status{font-size:clamp(34px,9vw,80px)}
      .substatus{font-size:clamp(18px,4vw,34px)}
    }
  </style>
</head>
<body>
  <div class="robot-screen">
    <div class="top-bar">
      <div class="brand">ROBOTALK V6</div>
      <div id="teacherDot" class="teacher-dot" title="Hold for teacher panel"></div>
    </div>

    <div id="faceArea" class="face-area">
      <div id="eyes" class="eyes">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
      </div>

      <div class="mouth-wrap">
        <div id="mouth" class="mouth closed"></div>
      </div>
    </div>

    <div class="status-panel">
      <div id="status" class="status">READY</div>
      <div id="substatus" class="substatus">Tap Start to meet RoboTalk.</div>
    </div>

    <div class="small-actions">
      <button onclick="stopAll()">Stop</button>
      <button onclick="resetRobot()">Reset</button>
    </div>

    <div id="teacherPanel" class="hidden-panel">
      <h3>Teacher / Debug Panel</h3>
      <p><b>Last heard:</b> <span id="lastHeard">—</span></p>
      <p><b>Target:</b> <span id="targetWord">—</span></p>
      <div id="debug" class="debug"></div>
    </div>

    <div id="startOverlay" class="start-overlay">
      <h1 class="start-title">🤖 RoboTalk</h1>
      <p class="start-sub">Friendly Robot Teacher<br>Practice speaking with phrasal verbs.</p>
      <button onclick="startRobot()">START ROBOT</button>
    </div>
  </div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = null;
let running = false;
let speaking = false;
let currentStep = 0;
let retryCount = 0;
let finalText = "";
let interimText = "";
let listenTimer = null;
let silenceTimer = null;
let blinkTimer = null;
let nameMemory = "my friend";

const lesson = [
  {
    kind:"name",
    say:"Hello! I am RoboTalk, your friendly robot teacher. What is your name?",
    retry:"Please say your name. You can say, my name is Jake."
  },
  {
    kind:"warmup",
    say:"Nice to meet you, NAME. How are you today?",
    accept:["fine","good","great","happy","okay","ok","wonderful","tired","sleepy","sad"],
    success:"Thank you for telling me. I am happy to talk with you today.",
    retry:"Please answer with a short sentence, like, I am fine."
  },
  {
    kind:"intro",
    say:"Today, we will practice phrasal verbs. Please answer in a complete sentence.",
    auto:true
  },
  {
    kind:"phrasal",
    phrasal:"wake up",
    say:"First phrasal verb: wake up. What time do you usually wake up?",
    success:"Excellent! You used wake up correctly.",
    retry:"Good try. Please answer using wake up. For example, I wake up at six."
  },
  {
    kind:"phrasal",
    phrasal:"get up",
    say:"Next phrasal verb: get up. What do you do after you get up?",
    success:"Great speaking! You used get up correctly.",
    retry:"Good try. Please use get up. For example, after I get up, I brush my teeth."
  },
  {
    kind:"phrasal",
    phrasal:"turn on",
    say:"Next phrasal verb: turn on. What do you turn on when you study?",
    success:"Very good! You used turn on correctly.",
    retry:"Please try again using turn on. For example, I turn on my computer."
  },
  {
    kind:"phrasal",
    phrasal:"look for",
    say:"Last phrasal verb: look for. What do you look for when you lose something?",
    success:"Excellent! You used look for correctly.",
    retry:"Please answer using look for. For example, I look for my pencil."
  },
  {
    kind:"end",
    say:"Wonderful work, NAME! You practiced wake up, get up, turn on, and look for. See you next time!"
  }
];

function $(id){return document.getElementById(id)}
function clean(text){
  return (text || "").toLowerCase().replace(/[.,!?]/g," ").replace(/\s+/g," ").trim();
}
function debug(msg){
  const box = $("debug");
  const time = new Date().toLocaleTimeString();
  box.textContent += "[" + time + "] " + msg + "\n";
  box.scrollTop = box.scrollHeight;
}
function sayWithName(text){
  return text.replaceAll("NAME", nameMemory);
}

function setFace(mode, main, sub){
  const eyes = $("eyes");
  const mouth = $("mouth");
  eyes.classList.remove("thinkingEyes","listeningEyes","happyEyes");
  mouth.className = "mouth";

  if(mode === "talking"){
    mouth.classList.add("talking");
    eyes.classList.add("happyEyes");
  } else if(mode === "listening"){
    mouth.classList.add("closed");
    eyes.classList.add("listeningEyes");
  } else if(mode === "thinking"){
    mouth.classList.add("thinking");
    eyes.classList.add("thinkingEyes");
  } else {
    mouth.classList.add("closed");
  }

  $("status").textContent = main;
  $("substatus").textContent = sub || "";
}

function scheduleBlink(){
  clearTimeout(blinkTimer);
  const delay = 2500 + Math.random() * 3500;
  blinkTimer = setTimeout(() => {
    if(!speaking){
      $("eyes").classList.add("blink");
      setTimeout(() => $("eyes").classList.remove("blink"), 160);
    }
    scheduleBlink();
  }, delay);
}

function initRecognition(){
  if(!SpeechRecognition){
    setFace("idle","NOT SUPPORTED","Please use Google Chrome.");
    return false;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    finalText = "";
    interimText = "";
    setFace("listening","🎤 LISTENING","Speak now.");
    debug("Recognition started.");
    clearTimeout(listenTimer);
    listenTimer = setTimeout(() => stopListeningSafely(), 12000);
  };

  recognition.onspeechstart = () => {
    setFace("listening","🎤 LISTENING","I can hear you.");
    clearTimeout(silenceTimer);
    debug("Speech started.");
  };

  recognition.onspeechend = () => {
    setFace("listening","🟢 YOUR TURN","Finish your sentence.");
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => stopListeningSafely(), 2300);
    debug("Speech ended. Waiting before processing.");
  };

  recognition.onresult = (event) => {
    let interim = "";
    let finalChunk = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
      const transcript = event.results[i][0].transcript;
      if(event.results[i].isFinal){
        finalChunk += transcript + " ";
      } else {
        interim += transcript + " ";
      }
    }

    if(finalChunk.trim()) finalText += finalChunk;
    interimText = interim;

    const heard = (finalText + " " + interimText).trim();
    if(heard){
      $("lastHeard").textContent = heard;
      debug("Heard: " + heard);
    }
  };

  recognition.onerror = (event) => {
    debug("Recognition error: " + event.error);
    if(event.error === "no-speech"){
      finalText = "";
      interimText = "";
    }
  };

  recognition.onend = () => {
    clearTimeout(listenTimer);
    clearTimeout(silenceTimer);
    debug("Recognition ended.");
    if(!running || speaking) return;

    setFace("thinking","🧠 THINKING","Let me check your answer.");
    setTimeout(() => processAnswer((finalText + " " + interimText).trim()), 850);
  };

  return true;
}

function speak(text, callback){
  if(!running) return;
  speaking = true;
  stopListeningSafely();

  const spoken = sayWithName(text);
  setFace("talking","🔊 ROBOT TALKING", spoken);
  debug("Robot: " + spoken);

  const utter = new SpeechSynthesisUtterance(spoken);
  utter.lang = "en-US";
  utter.rate = 0.88;
  utter.pitch = 1.05;

  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => /zira|jenny|aria|samantha|female|google us english/i.test(v.name));
  if(preferred) utter.voice = preferred;

  utter.onend = () => {
    speaking = false;
    if(callback){
      callback();
    } else {
      setFace("thinking","🟢 YOUR TURN","Get ready to speak.");
      setTimeout(startListening, 1400);
    }
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function startListening(){
  if(!running || speaking || !recognition) return;
  try{
    finalText = "";
    interimText = "";
    recognition.start();
  }catch(e){
    debug("Recognition start retry.");
    setTimeout(() => {
      try{ recognition.start(); }catch(err){ debug("Start failed again: " + err.message); }
    }, 450);
  }
}

function stopListeningSafely(){
  clearTimeout(listenTimer);
  clearTimeout(silenceTimer);
  if(recognition){
    try{ recognition.stop(); }catch(e){}
  }
}

function startRobot(){
  $("startOverlay").classList.add("hidden");
  if(!initRecognition()) return;
  running = true;
  speaking = false;
  currentStep = 0;
  retryCount = 0;
  nameMemory = "my friend";
  $("debug").textContent = "";
  $("lastHeard").textContent = "—";
  $("targetWord").textContent = "—";
  scheduleBlink();
  askStep();
}

function askStep(){
  if(!running) return;
  const step = lesson[currentStep];
  if(!step) return;

  $("targetWord").textContent = step.phrasal || step.kind;

  if(step.kind === "end"){
    speak(step.say, () => {
      running = false;
      setFace("idle","✅ FINISHED","Great job!");
    });
    return;
  }

  if(step.auto){
    speak(step.say, () => {
      currentStep++;
      setTimeout(askStep, 900);
    });
    return;
  }

  speak(step.say);
}

function extractName(text){
  let t = clean(text);
  t = t.replace("my name is ","")
       .replace("i am ","")
       .replace("i'm ","")
       .replace("name is ","")
       .replace("this is ","")
       .trim();

  const parts = t.split(" ").filter(Boolean);
  if(parts.length === 0) return "";
  let candidate = parts[0];

  if(["hello","hi","yes","no","fine","good","okay","ok"].includes(candidate)) return "";
  return candidate.charAt(0).toUpperCase() + candidate.slice(1);
}

function processAnswer(raw){
  if(!running) return;

  const text = clean(raw);
  $("lastHeard").textContent = text || "No speech detected.";
  debug("Processing: " + (text || "EMPTY"));

  const step = lesson[currentStep];

  if(!text){
    speak("I did not hear anything. Please try again.");
    return;
  }

  if(step.kind === "name"){
    const name = extractName(text);
    if(name){
      nameMemory = name;
      retryCount = 0;
      currentStep++;
      speak("Nice to meet you, " + nameMemory + ".", () => setTimeout(askStep, 800));
    } else {
      retryCount++;
      speak(step.retry);
    }
    return;
  }

  if(step.kind === "warmup"){
    const okay = step.accept.some(w => text.includes(w));
    if(okay || text.length > 2){
      retryCount = 0;
      currentStep++;
      speak(step.success, () => setTimeout(askStep, 800));
    } else {
      retryCount++;
      speak(step.retry);
    }
    return;
  }

  if(step.kind === "phrasal"){
    const target = step.phrasal;
    const correct = text.includes(target);
    $("targetWord").textContent = target;

    if(correct){
      retryCount = 0;
      currentStep++;
      speak(step.success, () => setTimeout(askStep, 800));
    } else {
      retryCount++;
      if(retryCount >= 3){
        retryCount = 0;
        currentStep++;
        speak("Good try. The phrase was " + target + ". Let us continue.", () => setTimeout(askStep, 800));
      } else {
        speak(step.retry);
      }
    }
    return;
  }
}

function stopAll(){
  running = false;
  speaking = false;
  speechSynthesis.cancel();
  stopListeningSafely();
  setFace("idle","STOPPED","Tap Reset or Start again.");
}

function resetRobot(){
  stopAll();
  $("startOverlay").classList.remove("hidden");
  $("debug").textContent = "";
  $("lastHeard").textContent = "—";
  $("targetWord").textContent = "—";
  setFace("idle","READY","Tap Start to meet RoboTalk.");
}

let holdTimer = null;
$("teacherDot").addEventListener("pointerdown", () => {
  holdTimer = setTimeout(() => {
    $("teacherPanel").classList.toggle("show");
  }, 3000);
});
$("teacherDot").addEventListener("pointerup", () => clearTimeout(holdTimer));
$("teacherDot").addEventListener("pointerleave", () => clearTimeout(holdTimer));

if("speechSynthesis" in window){
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
scheduleBlink();
</script>
</body>
</html>
